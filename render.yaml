services:
  - type: web
    name: linesbyams-api
    env: node
    region: frankfurt
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_EXPIRE
        value: 7d
      - key: JWT_SECRET
        generateValue: true        # Render auto-generates a strong secret
      - key: MONGO_URI
        sync: false                # paste your MongoDB Atlas connection string
      - key: CLIENT_URL
        sync: false                # your live frontend URL (set after Vercel deploy)
      - key: SEED_ADMIN_EMAIL
        sync: false                # optional — admin login email
      - key: SEED_ADMIN_PASSWORD
        sync: false                # optional — admin login password
      - key: STRIPE_SECRET_KEY
        sync: false                # optional for launch (booking payments)
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false                # optional — image uploads
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
